<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tshipi Works | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --black: #0a0a0a; --charcoal: #141414; --steel: #1e1e1e; --iron: #2a2a2a;
            --mid: #444; --muted: #888; --light: #c8c8c8; --white: #f5f5f0;
            --orange: #e85d04; --orange-lt: #ff7b2e; --green: #25D366; --red: #e05252;
            --font-display: 'Bebas Neue', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'DM Mono', monospace;
            --transition: 0.25s ease;
        }
        html, body { height: 100%; }
        body { background: var(--black); color: var(--white); font-family: var(--font-body); font-size: 15px; line-height: 1.5; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

        /* ---- LOGIN SCREEN ---- */
        #loginScreen {
            position: fixed; inset: 0; background: var(--black);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .login-card {
            background: var(--charcoal); border: 1px solid var(--iron);
            border-radius: 4px; padding: 48px 40px; width: 100%; max-width: 380px;
            position: relative;
        }
        .login-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--orange); border-radius: 4px 4px 0 0; }
        .login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
        .login-logo-icon { width: 32px; height: 32px; background: var(--orange); clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); position: relative; }
        .login-logo-icon::after { content: ''; position: absolute; inset: 4px; background: var(--charcoal); clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); }
        .login-logo span { font-family: var(--font-display); font-size: 18px; letter-spacing: 3px; }
        .login-logo span b { color: var(--orange); font-weight: 400; }
        .login-card h2 { font-family: var(--font-display); font-size: 28px; letter-spacing: 1px; margin-bottom: 6px; }
        .login-card p { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
        .login-field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
        .login-field label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
        .login-field input { background: var(--steel); border: 1px solid var(--iron); border-radius: 2px; color: var(--white); padding: 13px 16px; font-family: var(--font-body); font-size: 14px; transition: border-color var(--transition); }
        .login-field input:focus { outline: none; border-color: var(--orange); }
        .login-btn { width: 100%; background: var(--orange); color: var(--black); border: none; border-radius: 2px; padding: 15px; font-family: var(--font-mono); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; margin-top: 8px; transition: background var(--transition); font-weight: 600; }
        .login-btn:hover { background: var(--orange-lt); }
        .login-error { background: rgba(224,82,82,0.12); border: 1px solid rgba(224,82,82,0.3); color: var(--red); border-radius: 2px; padding: 10px 14px; font-size: 13px; margin-top: 12px; display: none; }

        /* ---- DASHBOARD ---- */
        #dashboard { display: none; min-height: 100vh; animation: fadeIn 0.4s ease; }

        /* Sidebar */
        .sidebar {
            position: fixed; top: 0; left: 0; bottom: 0; width: 220px;
            background: var(--charcoal); border-right: 1px solid var(--iron);
            display: flex; flex-direction: column; z-index: 100;
        }
        .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid var(--iron); display: flex; align-items: center; gap: 10px; }
        .sidebar-logo-icon { width: 28px; height: 28px; background: var(--orange); clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); position: relative; flex-shrink: 0; }
        .sidebar-logo-icon::after { content: ''; position: absolute; inset: 3px; background: var(--charcoal); clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); }
        .sidebar-logo span { font-family: var(--font-display); font-size: 16px; letter-spacing: 2px; }
        .sidebar-logo span b { color: var(--orange); font-weight: 400; }

        .sidebar-nav { flex: 1; padding: 20px 0; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); cursor: pointer; transition: color var(--transition), background var(--transition); border: none; background: none; width: 100%; text-align: left; }
        .nav-item svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; flex-shrink: 0; }
        .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.04); }
        .nav-item.active { color: var(--orange); background: rgba(232,93,4,0.08); border-right: 2px solid var(--orange); }

        .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--iron); }
        .sidebar-footer p { font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; color: var(--mid); }
        .logout-btn { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); cursor: pointer; border: none; background: none; margin-top: 10px; transition: color var(--transition); padding: 0; }
        .logout-btn:hover { color: var(--red); }
        .logout-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

        /* Main content */
        .main { margin-left: 220px; padding: 32px; min-height: 100vh; }

        /* Top bar */
        .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
        .topbar h1 { font-family: var(--font-display); font-size: 36px; letter-spacing: 2px; color: var(--white); }
        .topbar-right { display: flex; align-items: center; gap: 16px; }
        .refresh-btn { display: flex; align-items: center; gap: 8px; background: var(--steel); border: 1px solid var(--iron); color: var(--light); padding: 10px 18px; border-radius: 2px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: border-color var(--transition); }
        .refresh-btn:hover { border-color: var(--orange); color: var(--orange); }
        .refresh-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
        .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }

        /* KPI cards */
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
        .kpi-card { background: var(--charcoal); border: 1px solid var(--iron); border-radius: 2px; padding: 24px; position: relative; overflow: hidden; transition: border-color var(--transition); }
        .kpi-card:hover { border-color: rgba(232,93,4,0.4); }
        .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; bottom: 0; background: var(--orange); }
        .kpi-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
        .kpi-value { font-family: var(--font-display); font-size: 44px; line-height: 1; color: var(--orange); letter-spacing: 1px; }
        .kpi-sub { font-size: 12px; color: var(--mid); margin-top: 6px; }

        /* Filter bar */
        .filter-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-bar input, .filter-bar select { background: var(--charcoal); border: 1px solid var(--iron); color: var(--white); padding: 10px 14px; border-radius: 2px; font-family: var(--font-body); font-size: 13px; transition: border-color var(--transition); }
        .filter-bar input:focus, .filter-bar select:focus { outline: none; border-color: var(--orange); }
        .filter-bar input { flex: 1; min-width: 200px; }
        .filter-bar input::placeholder { color: var(--mid); }
        .filter-bar select option { background: var(--charcoal); }
        .results-count { font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; color: var(--muted); margin-left: auto; }

        /* Table */
        .table-wrap { background: var(--charcoal); border: 1px solid var(--iron); border-radius: 2px; overflow: hidden; }
        .table-header { padding: 16px 24px; border-bottom: 1px solid var(--iron); display: flex; align-items: center; justify-content: space-between; }
        .table-header h3 { font-family: var(--font-mono); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--orange); }
        .export-btn { display: flex; align-items: center; gap: 6px; background: transparent; border: 1px solid var(--iron); color: var(--muted); padding: 8px 14px; border-radius: 2px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all var(--transition); }
        .export-btn:hover { border-color: var(--orange); color: var(--orange); }
        .export-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }

        table { width: 100%; border-collapse: collapse; }
        thead th { padding: 14px 20px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); text-align: left; border-bottom: 1px solid var(--iron); background: var(--steel); }
        tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background var(--transition); }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: rgba(255,255,255,0.03); }
        tbody td { padding: 14px 20px; font-size: 14px; color: var(--light); vertical-align: middle; }
        tbody td.name-cell { font-weight: 500; color: var(--white); }
        tbody td.phone-cell a { color: var(--orange); text-decoration: none; font-family: var(--font-mono); font-size: 13px; }
        tbody td.phone-cell a:hover { color: var(--orange-lt); }

        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
        .badge-gate { background: rgba(232,93,4,0.15); color: var(--orange); }
        .badge-burglar { background: rgba(212,160,23,0.15); color: var(--gold); }
        .badge-carport { background: rgba(37,211,102,0.12); color: #25D366; }
        .badge-structural { background: rgba(100,149,237,0.15); color: #6495ED; }
        .badge-railing { background: rgba(186,85,211,0.15); color: #BA55D3; }
        .badge-furniture { background: rgba(255,99,71,0.15); color: #FF6347; }
        .badge-other { background: rgba(136,136,136,0.15); color: var(--muted); }

        .date-cell { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
        .msg-cell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; color: var(--muted); }

        .action-btn { background: none; border: 1px solid var(--iron); color: var(--muted); padding: 6px 10px; border-radius: 2px; cursor: pointer; font-size: 12px; transition: all var(--transition); display: inline-flex; align-items: center; gap: 5px; }
        .action-btn:hover { border-color: var(--green); color: var(--green); }
        .action-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

        /* Empty state */
        .empty-state { padding: 64px 24px; text-align: center; }
        .empty-state svg { width: 48px; height: 48px; stroke: var(--mid); fill: none; stroke-width: 1.5; margin: 0 auto 16px; }
        .empty-state h4 { font-family: var(--font-display); font-size: 22px; color: var(--muted); letter-spacing: 1px; margin-bottom: 8px; }
        .empty-state p { font-size: 13px; color: var(--mid); }

        /* Loading */
        .loading { padding: 64px 24px; text-align: center; }
        .loading-spinner { width: 36px; height: 36px; border: 3px solid var(--iron); border-top-color: var(--orange); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        .loading p { font-family: var(--font-mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }

        /* Toast */
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--charcoal); border: 1px solid var(--iron); color: var(--white); padding: 14px 24px; border-radius: 40px; font-size: 13px; z-index: 9999; transition: transform 0.3s ease; white-space: nowrap; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: rgba(37,211,102,0.4); }
        .toast.error { border-color: rgba(224,82,82,0.4); color: var(--red); }

        /* Pagination */
        .pagination { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-top: 1px solid var(--iron); }
        .pagination-info { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 1px; }
        .pagination-btns { display: flex; gap: 8px; }
        .page-btn { background: var(--steel); border: 1px solid var(--iron); color: var(--light); padding: 8px 14px; border-radius: 2px; font-family: var(--font-mono); font-size: 11px; cursor: pointer; transition: all var(--transition); }
        .page-btn:hover:not(:disabled) { border-color: var(--orange); color: var(--orange); }
        .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .page-btn.active { background: var(--orange); border-color: var(--orange); color: var(--black); }

        @media (max-width: 900px) {
            .sidebar { width: 60px; }
            .sidebar-logo span, .nav-item span, .sidebar-footer { display: none; }
            .nav-item { justify-content: center; padding: 14px; }
            .main { margin-left: 60px; padding: 20px; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            table { font-size: 13px; }
            thead th:nth-child(5), tbody td:nth-child(5) { display: none; }
        }
        @media (max-width: 600px) {
            .kpi-grid { grid-template-columns: 1fr 1fr; }
            thead th:nth-child(4), tbody td:nth-child(4),
            thead th:nth-child(6), tbody td:nth-child(6) { display: none; }
        }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="loginScreen">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-icon"></div>
                <span>TSHIPI <b>WORKS</b></span>
            </div>
            <h2>Admin Login</h2>
            <p>Enter your password to access the dashboard.</p>
            <div class="login-field">
                <label>Password</label>
                <input type="password" id="passwordInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter') login()">
            </div>
            <button class="login-btn" onclick="login()">Access Dashboard</button>
            <div class="login-error" id="loginError">Incorrect password. Please try again.</div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard">
        <div class="sidebar">
            <div class="sidebar-logo">
                <div class="sidebar-logo-icon"></div>
                <span>TSHIPI <b>WORKS</b></span>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                    <span>Leads</span>
                </button>
                <button class="nav-item" onclick="window.open('index.html','_blank')">
                    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
                    <span>View Site</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <p>CodeEl Admin</p>
                <button class="logout-btn" onclick="logout()">
                    <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                    <span>Logout</span>
                </button>
            </div>
        </div>

        <main class="main">
            <div class="topbar">
                <h1>QUOTE LEADS</h1>
                <div class="topbar-right">
                    <button class="refresh-btn" id="refreshBtn" onclick="loadLeads()">
                        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
                        Refresh
                    </button>
                </div>
            </div>

            <!-- KPIs -->
            <div class="kpi-grid">
                <div class="kpi-card"><div class="kpi-label">Total Leads</div><div class="kpi-value" id="kpiTotal">—</div><div class="kpi-sub">All time</div></div>
                <div class="kpi-card"><div class="kpi-label">This Month</div><div class="kpi-value" id="kpiMonth">—</div><div class="kpi-sub" id="kpiMonthLabel">—</div></div>
                <div class="kpi-card"><div class="kpi-label">This Week</div><div class="kpi-value" id="kpiWeek">—</div><div class="kpi-sub">Last 7 days</div></div>
                <div class="kpi-card"><div class="kpi-label">Top Service</div><div class="kpi-value" id="kpiTop" style="font-size:20px;padding-top:8px;">—</div><div class="kpi-sub">Most requested</div></div>
            </div>

            <!-- Filters -->
            <div class="filter-bar">
                <input type="text" id="searchInput" placeholder="Search by name, phone, or email..." oninput="filterLeads()">
                <select id="serviceFilter" onchange="filterLeads()">
                    <option value="">All Services</option>
                    <option value="Custom Gates">Custom Gates</option>
                    <option value="Burglar Bars">Burglar Bars</option>
                    <option value="Carports & Sheds">Carports & Sheds</option>
                    <option value="Structural Steel">Structural Steel</option>
                    <option value="Railings & Balustrades">Railings & Balustrades</option>
                    <option value="Custom Furniture">Custom Furniture</option>
                    <option value="Other">Other</option>
                </select>
                <span class="results-count" id="resultsCount"></span>
            </div>

            <!-- Table -->
            <div class="table-wrap">
                <div class="table-header">
                    <h3>// Quote Requests</h3>
                    <button class="export-btn" onclick="exportCSV()">
                        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                        Export CSV
                    </button>
                </div>
                <div id="tableBody">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p>Loading leads...</p>
                    </div>
                </div>
                <div class="pagination" id="pagination" style="display:none">
                    <span class="pagination-info" id="paginationInfo"></span>
                    <div class="pagination-btns" id="paginationBtns"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        'use strict';

        /* ---- Config ---- */
        const SUPABASE_URL  = 'https://pkolzgjtootsjhbvwtcf.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrb2x6Z2p0b290c2poYnZ3dGNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NzczMjMsImV4cCI6MjA5MDE1MzMyM30.blJvipdwJDTzfVDcceGFvk6EYWZNJDaxRnhKeM9EgyY';
        const ADMIN_PASSWORD = 'TshipiAdmin2026'; // ← Change this to whatever you want

        const PER_PAGE = 15;
        let allLeads = [];
        let filtered = [];
        let currentPage = 1;

        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON);

        /* ---- Login ---- */
        function login() {
            const pwd = document.getElementById('passwordInput').value;
            if (pwd === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                sessionStorage.setItem('tshipi_auth', '1');
                loadLeads();
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        function logout() {
            sessionStorage.removeItem('tshipi_auth');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }

        // Auto-login if session exists
        if (sessionStorage.getItem('tshipi_auth')) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadLeads();
        }

        /* ---- Load leads from Supabase ---- */
        async function loadLeads() {
            const btn = document.getElementById('refreshBtn');
            btn.classList.add('spinning');

            const { data, error } = await db
                .from('tshipi_quotes')
                .select('*')
                .order('created_at', { ascending: false });

            btn.classList.remove('spinning');

            if (error) {
                showToast('Failed to load leads: ' + error.message, 'error');
                return;
            }

            allLeads = data || [];
            updateKPIs();
            filterLeads();
        }

        /* ---- KPIs ---- */
        function updateKPIs() {
            const now = new Date();
            const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
            const weekStart  = new Date(now - 7 * 86400000);

            const thisMonth = allLeads.filter(l => new Date(l.created_at) >= monthStart);
            const thisWeek  = allLeads.filter(l => new Date(l.created_at) >= weekStart);

            // Top service
            const serviceCounts = {};
            allLeads.forEach(l => { if (l.service) serviceCounts[l.service] = (serviceCounts[l.service] || 0) + 1; });
            const topService = Object.entries(serviceCounts).sort((a,b) => b[1]-a[1])[0];

            document.getElementById('kpiTotal').textContent = allLeads.length;
            document.getElementById('kpiMonth').textContent = thisMonth.length;
            document.getElementById('kpiMonthLabel').textContent = now.toLocaleString('default', { month: 'long' });
            document.getElementById('kpiWeek').textContent = thisWeek.length;
            document.getElementById('kpiTop').textContent = topService ? topService[0].split(' ')[0] + (topService[0].split(' ')[1] ? ' ' + topService[0].split(' ')[1] : '') : '—';
        }

        /* ---- Filter ---- */
        function filterLeads() {
            const search  = document.getElementById('searchInput').value.toLowerCase();
            const service = document.getElementById('serviceFilter').value;

            filtered = allLeads.filter(l => {
                const matchSearch = !search ||
                    (l.name  && l.name.toLowerCase().includes(search))  ||
                    (l.phone && l.phone.toLowerCase().includes(search))  ||
                    (l.email && l.email.toLowerCase().includes(search));
                const matchService = !service || l.service === service;
                return matchSearch && matchService;
            });

            document.getElementById('resultsCount').textContent = `${filtered.length} result${filtered.length !== 1 ? 's' : ''}`;
            currentPage = 1;
            renderTable();
        }

        /* ---- Render table ---- */
        function renderTable() {
            const start = (currentPage - 1) * PER_PAGE;
            const page  = filtered.slice(start, start + PER_PAGE);
            const container = document.getElementById('tableBody');

            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-state">
                    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    <h4>No Leads Found</h4>
                    <p>Try adjusting your search or filters.</p>
                </div>`;
                document.getElementById('pagination').style.display = 'none';
                return;
            }

            const rows = page.map(l => {
                const date = new Date(l.created_at);
                const dateStr = date.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
                const badge = getBadge(l.service);
                const waMsg = encodeURIComponent(`Hi ${l.name}, this is Tshipi Works following up on your ${l.service} quote request.`);
                return `<tr>
                    <td class="name-cell">${esc(l.name || '—')}</td>
                    <td class="phone-cell"><a href="tel:${esc(l.phone)}">${esc(l.phone || '—')}</a></td>
                    <td>${esc(l.email || '—')}</td>
                    <td><span class="badge ${badge.cls}">${esc(l.service || '—')}</span></td>
                    <td class="msg-cell" title="${esc(l.message || '')}">${esc(l.message || '—')}</td>
                    <td class="date-cell">${dateStr}</td>
                    <td>
                        <button class="action-btn" onclick="window.open('https://wa.me/${l.phone ? l.phone.replace(/\s/g,'') : ''}?text=${waMsg}','_blank')" title="WhatsApp">
                            <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                            Reply
                        </button>
                    </td>
                </tr>`;
            }).join('');

            container.innerHTML = `<table>
                <thead><tr>
                    <th>Name</th><th>Phone</th><th>Email</th>
                    <th>Service</th><th>Message</th><th>Date</th><th>Action</th>
                </tr></thead>
                <tbody>${rows}</tbody>
            </table>`;

            renderPagination();
        }

        /* ---- Pagination ---- */
        function renderPagination() {
            const totalPages = Math.ceil(filtered.length / PER_PAGE);
            const pag = document.getElementById('pagination');
            const info = document.getElementById('paginationInfo');
            const btns = document.getElementById('paginationBtns');

            if (totalPages <= 1) { pag.style.display = 'none'; return; }
            pag.style.display = 'flex';

            const start = (currentPage - 1) * PER_PAGE + 1;
            const end   = Math.min(currentPage * PER_PAGE, filtered.length);
            info.textContent = `Showing ${start}–${end} of ${filtered.length}`;

            let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← Prev</button>`;
            for (let i = 1; i <= totalPages; i++) {
                if (totalPages <= 7 || i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1) {
                    html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
                } else if (Math.abs(i - currentPage) === 2) {
                    html += `<button class="page-btn" disabled>…</button>`;
                }
            }
            html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Next →</button>`;
            btns.innerHTML = html;
        }

        function goPage(n) {
            const totalPages = Math.ceil(filtered.length / PER_PAGE);
            if (n < 1 || n > totalPages) return;
            currentPage = n;
            renderTable();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        /* ---- Helpers ---- */
        function getBadge(service) {
            const map = {
                'Custom Gates':          { cls: 'badge-gate' },
                'Burglar Bars':          { cls: 'badge-burglar' },
                'Carports & Sheds':      { cls: 'badge-carport' },
                'Structural Steel':      { cls: 'badge-structural' },
                'Railings & Balustrades':{ cls: 'badge-railing' },
                'Custom Furniture':      { cls: 'badge-furniture' },
            };
            return map[service] || { cls: 'badge-other' };
        }

        function esc(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        /* ---- Export CSV ---- */
        function exportCSV() {
            if (!filtered.length) { showToast('No data to export', 'error'); return; }
            const headers = ['Name','Phone','Email','Service','Message','Date'];
            const rows = filtered.map(l => [
                l.name || '', l.phone || '', l.email || '',
                l.service || '', (l.message || '').replace(/\n/g,' '),
                new Date(l.created_at).toLocaleDateString('en-GB')
            ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','));
            const csv = [headers.join(','), ...rows].join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `tshipi_leads_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            showToast('CSV exported!', 'success');
        }

        /* ---- Toast ---- */
        function showToast(msg, type = '') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${type}`;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        /* ---- Real-time updates via Supabase ---- */
        db.channel('tshipi_quotes_changes')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'tshipi_quotes' }, payload => {
                allLeads.unshift(payload.new);
                updateKPIs();
                filterLeads();
                showToast('🔔 New quote request from ' + payload.new.name, 'success');
            })
            .subscribe();
    </script>
</body>
</html>
